<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Extras - CCOO Hábitat</title>
    <meta name="description" content="Registra tus extras diarios y lleva un control de tus ingresos adicionales">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calendario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="logo-container">
                <img src="cc.oo.jpg" alt="CCOO Hábitat" class="logo">
            </div>
            <div class="header-text">
                <h1>Calendario de Extras</h1>
                <p class="subtitle">Sección Sindical de Alcobendas</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Summary Cards -->
        <section class="summary-section">
            <div class="summary-card">
                <div class="summary-icon red">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <div class="summary-info">
                    <p class="summary-label">Este mes</p>
                    <p class="summary-value" id="monthTotal">0€</p>
                </div>
            </div>

            <div class="summary-card">
                <div class="summary-icon blue">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <div class="summary-info">
                    <p class="summary-label">Días trabajados</p>
                    <p class="summary-value" id="daysWorked">0</p>
                </div>
            </div>

            <div class="summary-card">
                <div class="summary-icon orange">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 6L9 17l-5-5"></path>
                    </svg>
                </div>
                <div class="summary-info">
                    <p class="summary-label">Promedio/día</p>
                    <p class="summary-value" id="avgPerDay">0€</p>
                </div>
            </div>
        </section>

        <!-- Calendar Navigation -->
        <section class="calendar-nav">
            <button class="nav-btn" id="prevMonth">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <h2 id="currentMonth">Febrero 2026</h2>
            <button class="nav-btn" id="nextMonth">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M9 18l6-6-6-6" />
                </svg>
            </button>
        </section>

        <!-- Calendar Grid -->
        <section class="calendar-section">
            <div class="calendar-weekdays">
                <div class="weekday">L</div>
                <div class="weekday">M</div>
                <div class="weekday">X</div>
                <div class="weekday">J</div>
                <div class="weekday">V</div>
                <div class="weekday">S</div>
                <div class="weekday">D</div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Days will be generated by JavaScript -->
            </div>
        </section>

        <!-- Recent Entries -->
        <section class="recent-entries">
            <h2>Últimos registros</h2>
            <div id="recentList" class="entries-list">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                    <p>Aún no hay registros este mes</p>
                    <small>Haz clic en un día del calendario para añadir extras</small>
                </div>
            </div>
        </section>
    </main>

    <!-- Add Entry Modal -->
    <div class="modal" id="entryModal">
        <div class="modal-overlay" id="entryOverlay"></div>
        <div class="modal-content entry-modal">
            <div class="modal-header">
                <h2 id="modalTitle">Registrar Extra</h2>
                <button class="close-btn" id="closeEntryModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <!-- Botón para ver tablas -->
                <button class="view-tables-btn" id="viewTablesBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    <span>📋 Ver Pluses 2026</span>
                </button>

                <!-- Contenedor para Consulta de Pluses -->
                <div id="tableImageContainer" class="table-image-container">
                    <div style="padding: 10px; background: #fff; border-bottom: 1px solid #ddd;">
                        <button class="back-to-form-btn" id="backToForm"
                            style="width: 100%; margin: 0; padding: 12px; background: var(--ccoo-red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">⬅️
                            VOLVER AL REGISTRO</button>
                    </div>
                    <div class="pdf-viewer-scroll">
                        <img src="documentos/convenios/pluses 2026.jpg"
                            style="width: 100%; height: auto; display: block;">
                    </div>
                </div>

                <div id="entryFormActions">
                    <div class="form-group">
                        <label for="entryDate">Fecha</label>
                        <input type="date" id="entryDate" class="form-input" readonly>
                    </div>

                    <div class="form-group">
                        <label for="entryAmount">Cantidad (€)</label>
                        <div class="input-with-icon">
                            <span class="input-icon">€</span>
                            <input type="number" id="entryAmount" class="form-input" placeholder="0.00" step="0.01"
                                min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="entryType">Tipo de extra</label>
                        <select id="entryType" class="form-input">
                            <option value="horas-extra">Horas extra</option>
                            <option value="sabado">Sábado</option>
                            <option value="domingo">Domingo</option>
                            <option value="suplencia-rsu-noche">Suplencia RSU noche</option>
                            <option value="suplencia-rsu-dia">Suplencia RSU día</option>
                            <option value="suplencia-carton">Suplencia cartón</option>
                            <option value="festivo">Festivo</option>
                            <option value="nocturnidad">Nocturnidad</option>
                            <option value="plus">Plus especial</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="entryNotes">Notas (opcional)</label>
                        <textarea id="entryNotes" class="form-input" rows="3"
                            placeholder="Detalles adicionales..."></textarea>
                    </div>
                </div> <!-- Cierre de entryFormActions -->

                <div class="modal-actions">
                    <button class="btn-secondary" id="deleteEntry" style="display: none;">Eliminar</button>
                    <button class="btn-primary" id="saveEntry">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="calendario.js"></script>
</body>

</html>
