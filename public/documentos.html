<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos - CCOO Hábitat</title>
    <meta name="description" content="Accede a convenios colectivos, actas, vídeos y presentaciones">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="documentos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="logo-container">
                <img src="cc.oo.jpg" alt="CCOO Hábitat" class="logo">
            </div>
            <div class="header-text">
                <h1 id="pageTitle">Documentos</h1>
                <p class="subtitle">Sección Sindical de Alcobendas</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Category Tabs -->
        <section class="category-tabs">
            <button class="tab-btn active" data-category="convenios">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span>Convenios</span>
            </button>
            <button class="tab-btn" data-category="actas">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span>Actas</span>
            </button>
            <button class="tab-btn" data-category="videos">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
                <span>Vídeos</span>
            </button>
            <button class="tab-btn" data-category="presentaciones">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <rect x="7" y="7" width="3" height="9"></rect>
                </svg>
                <span>Presentaciones</span>
            </button>
        </section>

        <!-- Search and Upload -->
        <section class="toolbar">
            <div class="search-bar-docs">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchDocs" placeholder="Buscar documentos..." class="search-input-docs">
            </div>
            <button class="upload-btn" id="uploadBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>Subir</span>
            </button>
        </section>

        <!-- Documents Grid -->
        <section class="documents-section" id="documentsContainer">
            <!-- Documents will be loaded here by JavaScript -->
        </section>
    </main>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-overlay" id="uploadOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Subir Documento</h2>
                <button class="close-btn" id="closeUploadModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="info-text">
                    ℹ️ Esta funcionalidad requiere un servidor backend.
                    Por ahora, contacta con el administrador para subir documentos.
                </p>
                <div class="form-group">
                    <label for="docTitle">Título del documento</label>
                    <input type="text" id="docTitle" class="form-input" placeholder="Ej: Convenio Colectivo 2024">
                </div>
                <div class="form-group">
                    <label for="docCategory">Categoría</label>
                    <select id="docCategory" class="form-input">
                        <option value="convenios">Convenio Colectivo</option>
                        <option value="actas">Acta</option>
                        <option value="videos">Vídeo</option>
                        <option value="presentaciones">Presentación</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="docFile">Archivo</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="docFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.mp4,.avi,.mov">
                        <label for="docFile" class="file-input-label">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <span>Seleccionar archivo</span>
                        </label>
                    </div>
                    <small class="file-name" id="fileName">Ningún archivo seleccionado</small>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" id="cancelUpload">Cancelar</button>
                    <button class="btn-primary" id="confirmUpload">Subir Documento</button>
                </div>
            </div>
        </div>
    </div>

    <script src="documentos.js"></script>
</body>

</html>
